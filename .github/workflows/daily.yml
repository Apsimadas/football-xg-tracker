name: Daily xG Update

on:
  schedule:
    # GitHub Actions cron is UTC-only and has no timezone support, so we
    # schedule both possible UTC times for "08:00 Athens" and let the gate
    # job below work out which one is real for today — this keeps the run
    # pinned to 08:00 Athens year-round instead of drifting an hour at DST.
    - cron: "0 5 * * *"  # 08:00 Athens during EEST (UTC+3, summer)
    - cron: "0 6 * * *"  # 08:00 Athens during EET (UTC+2, winter)
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run — always proceed."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Key off WHICH cron entry triggered this run, not what time it
          # actually executed — GitHub Actions schedules routinely fire
          # 30-120+ minutes late on free-tier repos, so checking the wall
          # clock at execution time is unreliable (it caused both of
          # today's runs to be wrongly skipped). github.event.schedule is
          # exact regardless of delay.
          TZ_NAME=$(TZ="Europe/Athens" date +%Z)  # EEST (summer) or EET (winter)
          SCHEDULE="${{ github.event.schedule }}"
          echo "Triggering cron: $SCHEDULE | Current Athens zone: $TZ_NAME"
          if { [ "$TZ_NAME" = "EEST" ] && [ "$SCHEDULE" = "0 5 * * *" ]; } || \
             { [ "$TZ_NAME" = "EET" ] && [ "$SCHEDULE" = "0 6 * * *" ]; }; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Wrong cron slot for the current Athens DST state — skipping (the other cron entry is the active one today)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run xG predictor
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_and_predict.py

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp matches.json _site/matches.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
